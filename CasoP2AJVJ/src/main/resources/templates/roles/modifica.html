<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"></head>
<body>
    <header th:replace="~{general/fragmentos :: header}"></header>
    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0" th:text="${rol.id != null ? 'Editar Rol' : 'Nuevo Rol'}"></h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/roles/guardar}" th:object="${rol}" method="POST">
                            <input type="hidden" th:field="*{id}"/>
                            <div class="mb-3">
                                <label class="form-label">Nombre del Rol:</label>
                                <input type="text" class="form-control" th:field="*{nombreRol}" required placeholder="Ej. ROLE_INVITADO"/>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/roles/listado}" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-success">Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
