<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"></head>
<body>
    <header th:replace="~{general/fragmentos :: header}"></header>
    <main class="container mt-4">
        <div class="row mb-3">
            <div class="col-md-8"><h2><i class="fa-solid fa-user-tag"></i> Gestión de Roles</h2></div>
            <div class="col-md-4 text-end">
                <a th:href="@{/roles/nuevo}" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Nuevo Rol</a>
            </div>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped">
                    <thead class="table-dark">
                        <tr><th>ID</th><th>Nombre del Rol</th><th>Acciones</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${roles}">
                            <td th:text="${r.id}"></td>
                            <td th:text="${r.nombreRol}" class="fw-bold"></td>
                            <td>
                                <a th:href="@{/roles/modificar/} + ${r.id}" class="btn btn-warning btn-sm">Editar</a>
                                <a th:href="@{/roles/eliminar/} + ${r.id}" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar rol?');">Eliminar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
