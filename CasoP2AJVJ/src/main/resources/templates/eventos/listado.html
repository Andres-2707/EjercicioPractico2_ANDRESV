<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{general/fragmentos :: head}"></head>
<body>
    <header th:replace="~{general/fragmentos :: header}"></header>

    <main class="container mt-4">
        <div class="row mb-3">
            <div class="col-md-8">
                <h2><i class="fa-solid fa-list"></i> Listado de Eventos</h2>
            </div>
            <div class="col-md-4 text-end" sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_ORGANIZADOR')">
                <a th:href="@{/eventos/nuevo}" class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i> Nuevo Evento
                </a>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h5 class="card-title">Eventos Activos</h5>
                        <h3 class="card-text" th:text="${totalActivos}">0</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Fecha</th>
                            <th>Capacidad</th>
                            <th>Estado</th>
                            <th sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_ORGANIZADOR')">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="evento : ${eventos}">
                            <td th:text="${evento.id}">1</td>
                            <td th:text="${evento.nombre}">Conferencia</td>
                            <td th:text="${evento.descripcion}">Detalle...</td>
                            <td th:text="${evento.fecha}">2026-05-10</td>
                            <td th:text="${evento.capacidad}">100</td>
                            <td>
                                <span th:if="${evento.activo}" class="badge bg-success">Activo</span>
                                <span th:unless="${evento.activo}" class="badge bg-secondary">Inactivo</span>
                            </td>
                            
                            <td sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_ORGANIZADOR')">
                                <a th:href="@{/eventos/modificar/} + ${evento.id}" class="btn btn-warning btn-sm">
                                    <i class="fa-solid fa-pen-to-square"></i> Editar
                                </a>
                                <a th:href="@{/eventos/eliminar/} + ${evento.id}" class="btn btn-danger btn-sm"
                                   onclick="return confirm('¿Seguro que desea eliminar este evento?');">
                                    <i class="fa-solid fa-trash"></i> Eliminar
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
