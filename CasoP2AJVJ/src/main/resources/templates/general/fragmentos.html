<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Plataforma de Eventos AJVJ</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

    <header th:fragment="header">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" th:href="@{/}">
                    <i class="fa-solid fa-calendar-check text-primary"></i> Eventos AJVJ
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/eventos/listado}">
                                <i class="fa-solid fa-table-list"></i> Ver Eventos
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/consultas/eventos}">
                                <i class="fa-solid fa-magnifying-glass"></i> Consultas
                            </a>
                        </li>
                        
                        <li class="nav-item" sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_ORGANIZADOR')">
                            <a class="nav-link" th:href="@{/eventos/nuevo}">
                                <i class="fa-solid fa-plus-circle"></i> Nuevo Evento
                            </a>
                        </li>

                        <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                            <a class="nav-link" th:href="@{/usuarios/listado}">
                                <i class="fa-solid fa-users-gear"></i> Usuarios
                            </a>
                        </li>

                        <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                            <a class="nav-link" th:href="@{/roles/listado}">
                                <i class="fa-solid fa-tags"></i> Roles
                            </a>
                        </li>
                    </ul>
                    
                    <ul class="navbar-nav">
                        <li class="nav-item" sec:authorize="!isAuthenticated()">
                            <a class="nav-link btn btn-primary text-white px-3" th:href="@{/login}">
                                <i class="fa-solid fa-sign-in-alt"></i> Ingresar
                            </a>
                        </li>
                        
                        <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                            <a class="nav-link dropdown-toggle active" href="#" id="userMenu" role="button" data-bs-toggle="dropdown">
                                <i class="fa-solid fa-circle-user"></i> 
                                <span th:text="${session.nombreUsuario}">Usuario</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                <li class="px-3 py-2 small text-muted border-bottom">
                                    Rol: <span sec:authentication="principal.authorities"></span>
                                </li>
                                <li>
                                    <form method="post" th:action="@{/logout}">
                                        <button class="dropdown-item text-danger" type="submit">
                                            <i class="fa-solid fa-power-off"></i> Cerrar Sesión
                                        </button>
                                    </form>
                                </li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <footer th:fragment="footer" class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <p class="mb-1 fw-bold">Universidad Fidélitas</p>
                    <p class="mb-0 small text-muted">
                        &copy; 2026 - Caso Práctico 2 | Desarrollo de Aplicaciones Web y Patrones
                    </p>
                    <div class="mt-2">
                        <i class="fa-brands fa-java mx-2"></i>
                        <i class="fa-brands fa-bootstrap mx-2"></i>
                        <i class="fa-brands fa-github mx-2"></i>
                    </div>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
