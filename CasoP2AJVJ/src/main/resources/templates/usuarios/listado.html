<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{general/fragmentos :: head}"></head>
<body>
    <header th:replace="~{general/fragmentos :: header}"></header>

    <main class="container mt-4 mb-5">
        <div class="row mb-3">
            <div class="col-md-8">
                <h2><i class="fa-solid fa-users-gear"></i> Gestión de Usuarios</h2>
            </div>
            <div class="col-md-4 text-end">
                <a th:href="@{/usuarios/nuevo}" class="btn btn-primary shadow-sm">
                    <i class="fa-solid fa-user-plus"></i> Nuevo Usuario
                </a>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th># ID</th>
                            <th>Nombre</th>
                            <th>Correo Electrónico</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${usuarios}">
                            <td th:text="${u.id}"></td>
                            <td th:text="${u.nombre}" class="fw-bold"></td>
                            <td th:text="${u.email}"></td>
                            <td><span class="badge bg-info text-dark" th:text="${u.rol.nombreRol}"></span></td>
                            <td>
                                <span th:if="${u.activo}" class="text-success"><i class="fa-solid fa-circle-check"></i> Activo</span>
                                <span th:unless="${u.activo}" class="text-danger"><i class="fa-solid fa-circle-xmark"></i> Inactivo</span>
                            </td>
                            <td>
                                <a th:href="@{/usuarios/modificar/} + ${u.id}" class="btn btn-warning btn-sm">
                                    <i class="fa-solid fa-user-pen"></i> Editar
                                </a>
                                <a th:href="@{/usuarios/eliminar/} + ${u.id}" class="btn btn-danger btn-sm"
                                   onclick="return confirm('¿Está seguro de eliminar este usuario? Esta acción no se puede deshacer.');">
                                    <i class="fa-solid fa-trash-can"></i> Eliminar
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
