<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"></head>
<body>
    <header th:replace="~{general/fragmentos :: header}"></header>

    <main class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0">
                            <i class="fa-solid fa-id-card"></i>
                            <span th:text="${usuario.id != null ? 'Modificar Usuario' : 'Nuevo Usuario'}"></span>
                        </h4>
                    </div>
                    <div class="card-body">
                        
                        <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="POST">
                            
                            <input type="hidden" th:field="*{id}"/>

                            <div class="mb-3">
                                <label for="nombre" class="form-label fw-bold">Nombre Completo:</label>
                                <input type="text" class="form-control" th:field="*{nombre}" id="nombre" required placeholder="Ej. Juan Pérez"/>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">Correo Electrónico:</label>
                                <input type="email" class="form-control" th:field="*{email}" id="email" required placeholder="correo@ejemplo.com"/>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-bold">Contraseña:</label>
                                <input type="password" class="form-control" th:field="*{password}" id="password" th:required="${usuario.id == null}" placeholder="Asigne una contraseña segura"/>
                                <small class="text-muted" th:if="${usuario.id != null}">Deje en blanco si no desea cambiar la contraseña actual (requiere lógica extra en el controlador).</small>
                            </div>

                            <div class="mb-3">
                                <label for="rol" class="form-label fw-bold">Rol en el Sistema:</label>
                                <select class="form-select" th:field="*{rol.id}" id="rol" required>
                                    <option value="" disabled selected>Seleccione un rol...</option>
                                    <option th:each="r : ${roles}" 
                                            th:value="${r.id}" 
                                            th:text="${r.nombreRol}">
                                    </option>
                                </select>
                            </div>

                            <div class="mb-4 form-check form-switch">
                                <input class="form-check-input" type="checkbox" th:field="*{activo}" id="activo" checked/>
                                <label class="form-check-label fw-bold" for="activo">Usuario Activo (Permitir acceso al sistema)</label>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a th:href="@{/usuarios/listado}" class="btn btn-secondary">
                                    <i class="fa-solid fa-arrow-left"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-success">
                                    <i class="fa-solid fa-floppy-disk"></i> Guardar Usuario
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
